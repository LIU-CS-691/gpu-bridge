services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: gpu
      POSTGRES_PASSWORD: gpu
      POSTGRES_DB: gpu_bridge
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gpu -d gpu_bridge"]
      interval: 3s
      timeout: 3s
      retries: 20

  db-test:
    image: postgres:16
    environment:
      POSTGRES_USER: gpu
      POSTGRES_PASSWORD: gpu
      POSTGRES_DB: gpu_bridge_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gpu -d gpu_bridge_test"]
      interval: 3s
      timeout: 3s
      retries: 20

  controller:
    build:
      context: ./controller
    environment:
      DATABASE_URL: postgresql+psycopg://gpu:gpu@db:5432/gpu_bridge
      API_TOKEN: ${API_TOKEN}
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
