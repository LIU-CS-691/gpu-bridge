name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  BOOTSTRAP_TOKEN: bootstrap-secret

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ruff
        run: pip install ruff==0.6.9

      - name: Check formatting
        run: ruff format --check .

      - name: Check linting
        run: ruff check .

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    services:
      db-test:
        image: postgres:16
        env:
          POSTGRES_USER: gpu
          POSTGRES_PASSWORD: gpu
          POSTGRES_DB: gpu_bridge_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U gpu -d gpu_bridge_test"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements-dev.txt
            controller/requirements.txt

      - name: Install dependencies
        run: |
          pip install -U pip
          pip install -r requirements-dev.txt -r controller/requirements.txt
          pip install -e ./cli -e ./worker

      - name: Run unit tests
        env:
          TEST_DATABASE_URL: postgresql+psycopg://gpu:gpu@localhost:5433/gpu_bridge_test
        run: PYTHONPATH=. pytest -q --tb=short

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements-dev.txt
            controller/requirements.txt

      - name: Install dependencies
        run: |
          pip install -U pip
          pip install -r requirements-dev.txt -r controller/requirements.txt
          pip install -e ./cli -e ./worker

      - name: Start services
        run: |
          echo "BOOTSTRAP_TOKEN=bootstrap-secret" > .env
          docker compose up -d --build
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "Controller is ready"
              break
            fi
            echo "Waiting for controller... ($i/30)"
            sleep 2
          done

      - name: Run integration tests
        env:
          GPU_BRIDGE_SERVER: http://localhost:8000
          GPU_BRIDGE_TOKEN: bootstrap-secret
        run: PYTHONPATH=. pytest -q --tb=short tests/integration

      - name: Show logs on failure
        if: failure()
        run: docker compose logs

  deploy:
    name: Deploy Controller
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, integration-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: controller
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/gpu-bridge
            git pull origin main
            docker compose up -d --build
            echo "Waiting for health check..."
            for i in $(seq 1 15); do
              if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
                echo "Controller is healthy"
                exit 0
              fi
              sleep 2
            done
            echo "Health check failed"
            docker compose logs --tail=50
            exit 1
