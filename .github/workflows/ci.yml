name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  API_TOKEN: devtoken

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ruff
        run: pip install ruff==0.6.9

      - name: Check formatting
        run: ruff format --check .

      - name: Check linting
        run: ruff check .

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements-dev.txt
            controller/requirements.txt

      - name: Install dependencies
        run: |
          pip install -U pip
          pip install -r requirements-dev.txt -r controller/requirements.txt
          pip install -e ./cli -e ./worker

      - name: Run unit tests
        run: PYTHONPATH=. pytest -q --tb=short

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements-dev.txt
            controller/requirements.txt

      - name: Install dependencies
        run: |
          pip install -U pip
          pip install -r requirements-dev.txt -r controller/requirements.txt
          pip install -e ./cli -e ./worker

      - name: Start services
        run: |
          echo "API_TOKEN=devtoken" > .env
          docker compose up -d --build
          # Wait for controller to be healthy
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "Controller is ready"
              break
            fi
            echo "Waiting for controller... ($i/30)"
            sleep 2
          done

      - name: Run integration tests
        env:
          GPU_BRIDGE_SERVER: http://localhost:8000
          GPU_BRIDGE_TOKEN: devtoken
        run: PYTHONPATH=. pytest -q --tb=short tests/integration

      - name: Show logs on failure
        if: failure()
        run: docker compose logs
